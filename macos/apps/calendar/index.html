<div style="padding: 20px;">
    <div style="margin-bottom: 20px; display:flex; justify-content:space-between; align-items:center;">
        <h2 id="calendar-month-year" style="font-size: 1.5rem; font-weight: 700;">Month Year</h2>
        <i class="fas fa-plus" style="color:var(--accent-blue); cursor:pointer;" onclick="addEventPrompt()"></i>
    </div>
    <div id="calendar-view" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center;"></div>
    <div style="margin-top: 30px;">
        <div class="settings-header">UPCOMING EVENTS</div>
        <div id="events-list" class="settings-group"></div>
    </div>
</div>
