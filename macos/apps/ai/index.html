<div class="ai-container" style="display:flex; flex-direction:column; height:100%; padding:20px; background:rgba(10,10,10,0.95);">
    <div style="margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
        <select id="ai-model-select" style="background: rgba(255,255,255,0.1); color:white; border:none; padding:8px; border-radius:8px;">
            <option value="gpt-5">OpenAI GPT-5</option>
            <option value="claude-4.6">Claude 4.6</option>
            <option value="gemini-2.5">Gemini 2.5</option>
            <option value="gpt-4o" selected>GPT-4o</option>
        </select>
        <button onclick="clearAiChat()" style="background:none; border:none; color:#ff3b30;"><i class="fas fa-trash-alt"></i></button>
    </div>
    <div id="ai-chat-box" style="flex:1; overflow-y:auto; padding:10px;"></div>
    <div style="position:relative; margin-top:20px;">
        <input type="text" id="ai-input" placeholder="Hỏi Siri..." 
               style="width:100%; background:rgba(255,255,255,0.1); border:none; border-radius:20px; padding:12px 45px 12px 20px; color:white;"
               onkeypress="if(event.key==='Enter') sendAiMessage()">
        <i class="fas fa-paper-plane" onclick="sendAiMessage()" style="position:absolute; right:15px; top:14px; color:#007aff; cursor:pointer;"></i>
    </div>
</div>
